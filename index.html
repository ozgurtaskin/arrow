<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Arrow Physics Sandbox</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game" aria-label="Arrow physics sandbox"></canvas>
      <button id="swap-arrow" class="swap-arrow" type="button" aria-label="Swap current and next arrow">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 7h11l-3-3" />
          <path d="M17 17H6l3 3" />
          <path d="M18 7l-3 3" />
          <path d="M6 17l3-3" />
        </svg>
      </button>
      <button id="settings-toggle" class="settings-toggle" type="button" aria-controls="settings-panel" aria-expanded="false">
        Settings
      </button>
      <aside id="settings-panel" class="settings-panel" aria-label="Live settings"></aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
